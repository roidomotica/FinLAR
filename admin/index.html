<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración — FinLAR</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
  </style>
</head>
<body>
  <!--
    PANEL DE ADMINISTRACIÓN DE FINLAR (Decap CMS)
    ================================================
    Este archivo carga el panel de administración visual para gestionar
    los artículos del blog sin necesidad de editar código HTML.

    Para usarlo LOCALMENTE necesitas:
      1. Tener Node.js instalado (https://nodejs.org)
      2. Ejecutar el archivo "iniciar-admin.bat" incluido en el proyecto
      3. Abrir http://localhost:8080/admin en tu navegador

    Para usarlo en PRODUCCIÓN (GitHub Pages):
      - Simplemente navega a https://tu-url.github.io/FinLAR/admin
      - Se pedirá que inicies sesión con tu cuenta de GitHub
  -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
